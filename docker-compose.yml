# =========================================================================
# Supreme Main Server - Dokploy Compose
# Subdomain: cloud.supreme-cheats.xyz
# Databases: External MySQL (DB_URL), internal Redis
# =========================================================================

services:
  main-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: supreme-main-server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://supreme-main-server-redis:6379
      - DOWNLOAD_FILE_PATH=/main-server/Loader/client.exe
      - DATABASE_URL= # Set this in Dokploy (MySQL)
      - DATABASE_URL_LOGS= # Set this in Dokploy (PostgreSQL)
      - TOKEN_VALIDITY_SECONDS=
      - CLEANUP_INTERVAL_MINUTES=
      - SECRET_KEY=
      - XENFORO_API_URL=
      - XENFORO_API_KEY=
      - LOGGER_TOTP_SECRET=
      - LOGGING_API_KEY=
      - RATE_LIMIT_REQUESTS=
      - RATE_LIMIT_WINDOW=
      - LOADER_UPLOAD_KEY=
    volumes:
      - loader_data:/main-server/Loader
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    labels:
      - "traefik.enable=true"
      # Dashboard Subdomain (admin. - Must be isolated via /logs/ prefix to avoid Dokploy conflicts)
      - "traefik.http.routers.main-server-dashboard.rule=Host(`admin.supreme-cheats.xyz`) && PathPrefix(`/logs`)"
      - "traefik.http.routers.main-server-dashboard.entrypoints=websecure"
      - "traefik.http.routers.main-server-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.main-server-dashboard.service=main-server"
      
      # API Subdomain (cloud.)
      - "traefik.http.routers.main-server-api.rule=Host(`cloud.supreme-cheats.xyz`) && (PathPrefix(`/api`) || PathPrefix(`/log`) || PathPrefix(`/health`))"
      - "traefik.http.routers.main-server-api.entrypoints=websecure"
      - "traefik.http.routers.main-server-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.main-server-api.service=main-server"
      
      # Shared Load Balancer
      - "traefik.http.services.main-server.loadbalancer.server.port=8000"
    networks:
      - dokploy-network

  redis:
    image: "redis:7-alpine"
    container_name: supreme-main-server-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - dokploy-network

volumes:
  loader_data:
  redis_data:

networks:
  dokploy-network:
    external: true