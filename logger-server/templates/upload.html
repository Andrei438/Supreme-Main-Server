<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supreme | Upload Client</title>
    <link rel="icon" type="image/png" href="/logs/static/favicon.png">
    <link rel="stylesheet" href="/logs/static/styles.css">
</head>
<body class="login-page"> <!-- Reuse login-page layout for centered card -->
    <div class="login-wrapper">
        <div class="login-card upload-card" style="max-width: 500px;">
            <div class="login-header">
                <img src="/logs/static/supreme_logo.png" alt="Supreme" class="login-icon">
                <h1 class="login-title">Supreme</h1>
                <p class="login-subtitle">Upload Client Executable</p>
            </div>

            <div id="status-message" style="display: none; margin-bottom: 1.5rem;"></div>

            <form id="upload-form">
                <div class="form-group">
                    <label for="upload_key" class="form-label">Upload Secret Key</label>
                    <input 
                        type="password" 
                        id="upload_key" 
                        name="upload_key" 
                        class="form-input"
                        required 
                        placeholder="••••••••••••••••"
                    >
                </div>

                <div class="form-group">
                    <label for="client_file" class="form-label">Select Client (.exe)</label>
                    <input 
                        type="file" 
                        id="client_file" 
                        name="file" 
                        class="form-input"
                        accept=".exe"
                        required 
                    >
                </div>

                <div class="upload-progress-container" style="display: none; margin-bottom: 1.5rem;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem; font-size: 0.85rem; color: var(--text-tertiary);">
                        <span>Uploading...</span>
                        <span id="progress-percent">0%</span>
                    </div>
                    <div style="width: 100%; height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden;">
                        <div id="progress-bar" style="width: 0%; height: 100%; background: var(--primary); transition: width 0.3s ease;"></div>
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="submit-btn">🚀 Upload Client</button>
                <a href="/logs/" class="btn btn-secondary" style="display: block; text-align: center; margin-top: 1rem; text-decoration: none; width: 100%;">🔙 Back to Logs</a>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('upload-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const form = e.target;
            const statusMsg = document.getElementById('status-message');
            const submitBtn = document.getElementById('submit-btn');
            const progressContainer = document.querySelector('.upload-progress-container');
            const progressBar = document.getElementById('progress-bar');
            const progressPercent = document.getElementById('progress-percent');
            
            const fileInput = document.getElementById('client_file');
            const uploadKey = document.getElementById('upload_key').value;
            
            if (!fileInput.files[0]) return;

            // Reset UI
            statusMsg.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.style.opacity = '0.5';
            progressContainer.style.display = 'block';
            progressBar.style.width = '0%';
            progressPercent.innerText = '0%';

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            try {
                const xhr = new XMLHttpRequest();
                xhr.open('POST', '/logs/upload', true);
                xhr.setRequestHeader('X-Loader-Key', uploadKey);

                xhr.upload.onprogress = (event) => {
                    if (event.lengthComputable) {
                        const percent = Math.round((event.loaded / event.total) * 100);
                        progressBar.style.width = percent + '%';
                        progressPercent.innerText = percent + '%';
                    }
                };

                xhr.onload = () => {
                    submitBtn.disabled = false;
                    submitBtn.style.opacity = '1';
                    
                    let data;
                    try {
                        data = JSON.parse(xhr.responseText);
                    } catch (e) {
                        data = { detail: 'Unexpected server response' };
                    }

                    if (xhr.status === 200) {
                        statusMsg.innerHTML = '<div class="success-banner" style="background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); color: #10b981; padding: 1rem; border-radius: 0.5rem; text-align: center;">✅ Client uploaded successfully!</div>';
                        form.reset();
                        progressContainer.style.display = 'none';
                    } else {
                        statusMsg.innerHTML = `<div class="error-banner">⚠️ ${data.detail || 'Upload failed'}</div>`;
                    }
                    statusMsg.style.display = 'block';
                };

                xhr.onerror = () => {
                    submitBtn.disabled = false;
                    submitBtn.style.opacity = '1';
                    statusMsg.innerHTML = '<div class="error-banner">⚠️ Network error occurred</div>';
                    statusMsg.style.display = 'block';
                };

                xhr.send(formData);
                
            } catch (error) {
                console.error('Upload Error:', error);
                submitBtn.disabled = false;
                submitBtn.style.opacity = '1';
                statusMsg.innerHTML = '<div class="error-banner">⚠️ Failed to initiate upload</div>';
                statusMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
